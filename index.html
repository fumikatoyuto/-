<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Wire Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <canvas id="offscreenCanvas" style="display: none;"></canvas>

        <div id="ui-layer">
            <!-- メインメニュー -->
            <div id="menu-screen" class="screen">
                <h1 class="glow-text title">NEON WIRE</h1>
                <p class="subtitle">難易度を選択してください</p>
                
                <div class="game-description">
                    <p>壁や動く障害物に触れないように、<br>カーソルを操作してゴールを目指してください。</p>
                    <p class="reward-notice">🎁 すべての難易度をクリアすると<br>特別な報酬リンクをゲットできます！</p>
                </div>

                <div class="menu-buttons">
                    <button id="btn-easy" class="btn btn-easy" data-difficulty="easy">簡単 (Easy)</button>
                    <button id="btn-normal" class="btn btn-normal" data-difficulty="normal">普通 (Normal)</button>
                    <button id="btn-hard" class="btn btn-hard" data-difficulty="hard">難しい (Hard)</button>
                </div>
            </div>

            <!-- ゲームオーバー -->
            <div id="gameover-screen" class="screen hidden">
                <h1 class="glow-text error">ゲームオーバー</h1>
                <p>壁に激突しました！</p>
                <button id="btn-retry" class="btn">もう一度挑戦する</button>
                <button id="btn-back-from-fail" class="btn btn-secondary">メニューへ戻る</button>
            </div>

            <!-- ステージクリア -->
            <div id="clear-screen" class="screen hidden">
                <h1 class="glow-text success">ステージクリア！</h1>
                <p>お見事！</p>
                <button id="btn-back-from-clear" class="btn">メニューへ戻る</button>
            </div>

            <!-- 全クリア -->
            <div id="all-clear-screen" class="screen hidden">
                <h1 class="glow-text master">全ステージクリア！</h1>
                <p>おめでとうございます！報酬はこちら：</p>
                <a id="reward-link" href="#" target="_blank" class="reward-link">報酬を受け取る</a>
            </div>

            <div id="hud-timer">タイム: 0.0秒</div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="src/config.js"></script>
    <script src="src/stages/StageData.js"></script>
    <script src="src/engine/Particles.js"></script>
    <script src="src/engine/Collision.js"></script>
    <script src="src/engine/Game.js"></script>
</body>

</html>
